<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Web App</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="budget-container">
      <div class="app-title" style="display: flex; justify-content: space-between; align-items: center; padding-right: 20px;">
        <a href="">Budget<b>App</b></a>
        <a href="./privacy.html" style="font-size: 0.8rem; opacity: 0.7;">Privacy Policy</a>
      </div>
      <div class="budget-header">
        <div class="balance">
          <div class="title">Balance</div>
          <div class="value"><small>$</small>0</div>
        </div>
        <div class="account">
          <div class="income">
            <div class="title">Income</div>
            <div class="income-total"><small>$</small>0</div>
          </div>
          <div class="chart"></div>
          <div class="outcome">
            <div class="title">Outcome</div>
            <div class="outcome-total"><small>$</small>0</div>
          </div>
        </div>
      </div>
      <div class="budget-dashboard">
        <div class="dash-title">Dashboard</div>
        <div class="toggle">
          <div class="first-tab">Expenses</div>
          <div class="second-tab">Income</div>
          <div class="third-tab focus">All</div>
        </div>
        <div class="hide" id="expense">
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="expense-title-input"
              name="title"
              placeholder="title"
              required 
              maxlength="50"
            />
            <input
              type="number"
              id="expense-amount-input"
              name="amount"
              placeholder="$0"
              required
              min="0.01"
              max="9999999"
              step="0.01"
            />
            <div class="add-expense"><img src="icon/plus.png" alt="+" /></div>
          </div>
        </div>
        <div class="hide" id="income">
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="income-title-input"
              name="title"
              placeholder="title"
              required 
              maxlength="50"
            />
            <input
              type="number"
              id="income-amount-input"
              name="amount"
              placeholder="$0"
              required
              min="0.01"
              max="9999999"
              step="0.01"
            />
            <div class="add-income"><img src="icon/plus.png" alt="+" /></div>
          </div>
        </div>
        <div id="all">
          <ul class="list"></ul>
        </div>
      </div>
      <div id="toast" class="toast" aria-live="polite" role="status"></div>
    </div>
    <div id="cookie-modal" class="cookie-modal hide" role="dialog" aria-modal="true" aria-labelledby="cookie-title">
      <div class="cookie-banner">
        <h3 id="cookie-title">Cookie Preferences</h3>
        <p>We use cookies to ensure you get the best experience on our website. Read our <a href="./privacy.html" class="privacy-link">Privacy Policy</a> for more details.</p>
        <div class="cookie-buttons">
          <button id="btn-essential-cookies" class="btn-secondary">Accept Essential Only</button>
          <button id="btn-all-cookies" class="btn-primary">Accept All Cookies</button>
        </div>
      </div>
    </div>
    <script src="./chart.js"></script>
    <script src="./budget.js"></script>
  </body>
</html>
